record_config:
  type: "LCM" # options: ["LCM", "LCM2DevSuite"]
  interval: 20 # record every N frames
  lcm_channel: "CHANNEL_RECORD_TO_DEV_SUITE"
hand_config:
  hands:
  - hand: # Left
    type: "inspire_gripper"
    can_channel: 9
    can_id: 4
    pos: 0
    comm_type: 1
  - hand: # Right
    type: "inspire_gripper"
    can_channel: 12
    can_id: 4
    pos: 1
    comm_type: 1

imu_config:
  imus:
  # - imu: # second
  #   type: "micro_strain_cv7"
  #   port: 22
  #   port_path: "/dev/ttyACM0"
  #   baudrate: 921600
  #   is_main: true
  #type: "hipuc_hi13r4n"
  #type: "surpass_a500"
  - imu: # second
    type: "hipuc_hi13r4n"
    port: 22
    port_path: "/dev/ttyACM0"
    baudrate: 921600
    is_main: true
    comm_type: 1
  use_static_calib: false
battery_config:
  type: "baifan"
  comm_type: 1
  port: 22
  port_path: "/dev/ttyACM0"
  baudrate: 9600
  card: 0
  channel: 1
joint_config:
  use_same_servo_params: false
  cmd_torque_per_cnt: 1
  fb_torque_per_cnt: 1
  fb_current_per_cnt: 1
  joints:
  - joint: #0
    type: 3
    can_channel: 0
    can_id: 1
    direction: 1
    zero_pos: 0
    cnt_per_round: 6.2831853
    cmd_torque_per_cnt: 3
    fb_torque_per_cnt: 1
    # motor_uid: "240201"
    motor_name: "Head_Yaw"
    limit:
      security_level: 1
      max_position: 1.5708
      min_position: -1.5708
